title: zp29's Blog
description: 工作及生活分享
url: "https://blog.zp29.de"
baseurl: ""

# 主题 - minima 是 GitHub Pages 原生支持的简洁主题
remote_theme: jekyll/minima

# 启用 minima 主题的插件和功能
minima:
  skin: auto
  
# 代码高亮设置
highlighter: rouge
kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: false
# 构建设置
markdown: kramdown
permalink: /:year/:month/:day/:title/

# 插件
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-remote-theme

# 排除不需要的文件
exclude:
  - README.md
  - LICENSE
  - node_modules
  - vendor

# 默认值
defaults:
  - scope:
      path: "_posts"
      type: "posts"
    values:
      layout: "post"
      author: "zp29"
      toc: true
